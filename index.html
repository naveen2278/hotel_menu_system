<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NightEat - Digital Menu</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="frontend/css/style.css" />
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen" style="position: fixed; inset: 0; background: #05050f; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: all 0.8s ease;">
    <div style="text-align: center; animation: floatSmooth 3s infinite ease-in-out;">
      <img src="pagene.png" alt="Loading Logo" style="width: 180px; height: auto; filter: drop-shadow(0 0 30px rgba(212, 93, 38, 0.4));" />
      <div style="margin-top: 25px; color: var(--primary); font-family: 'Outfit'; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; font-size: 0.75rem; opacity: 0.8;">NightEat is loading...</div>
    </div>
  </div>

  <!-- Entry Selection Screen -->
  <div id="entry-selection" style="display: none; position: fixed; inset: 0; background: #05050f; z-index: 9000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
    <img src="pagene.png" alt="NightEat Logo" style="width: 150px; height: auto; margin-bottom: 40px; filter: drop-shadow(0 0 20px rgba(212, 93, 38, 0.3));" />
    <h2 style="color: white; margin-bottom: 30px; font-family: 'Outfit'; text-align: center;">How would you like to order?</h2>
    
    <div style="display: flex; gap: 20px; width: 100%; max-width: 400px;">
      <button class="choice-card" onclick="selectOrderType('Dine-in')" style="flex: 1; aspect-ratio: 1; background: var(--card-bg); border: 1px solid rgba(212, 93, 38, 0.2); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; gap: 10px;">
        <span style="font-size: 3rem;">🍽️</span>
        <span style="color: white; font-weight: 700; font-size: 1.1rem;">Dining</span>
      </button>
      <button class="choice-card" onclick="selectOrderType('Parcel')" style="flex: 1; aspect-ratio: 1; background: var(--card-bg); border: 1px solid rgba(212, 93, 38, 0.2); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; gap: 10px;">
        <span style="font-size: 3rem;">🛍️</span>
        <span style="color: white; font-weight: 700; font-size: 1.1rem;">Parcel</span>
      </button>
    </div>
  </div>

  <div class="site-wrapper" style="display: none;">
    <header class="hero">
      <div class="hero-content">
        <img src="pagene.png" alt="NightEat Logo" style="width: 250px; height: auto; filter: drop-shadow(0 0 20px rgba(212, 93, 38, 0.4));" />
      </div>
    </header>

    <main>
      <div class="container">
        <section class="filter-section reveal">
          <div class="filter-buttons" style="flex-wrap: wrap; justify-content: center;">
            <button class="filter-btn active" data-filter="All">All Dishes</button>
            <button class="filter-btn" data-filter="Veg">Pure Veg</button>
            <button class="filter-btn" data-filter="Non-Veg">Non-Veg</button>
            <button class="filter-btn" data-filter="Fresh Juice">Fresh Juice</button>
            <button class="filter-btn" data-filter="Soda">Soda</button>
            <button class="filter-btn" data-filter="Ice Cream">Ice Cream</button>
            <button class="filter-btn" data-filter="Desserts">Desserts</button>
          </div>
        </section>

        <section id="specialSection" style="display: none;">
          <h2 class="section-title reveal">Today's Special</h2>
          <div id="specialItems" class="menu-grid"></div>
        </section>

        <section>
          <h2 class="section-title reveal">Full Menu</h2>
          <div id="menuContainer" class="menu-grid"></div>
        </section>
      </div>
    </main>

    <footer style="padding: 40px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; 2026 NightEat Restaurant. All rights reserved.</p>
      <p style="margin-top: 10px;"><a href="frontend/admin.html" style="color: inherit; text-decoration: none; opacity: 0.5;">Admin Login</a></p>
    </footer>

    <!-- Floating Cart Button -->
    <div id="cartToggle" class="cart-toggle" style="display: none;">
      <span class="cart-icon">🛒</span>
      <span id="cartCount" class="cart-count">0</span>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal" style="display:none; position: fixed; inset:0; z-index:1000; align-items:center; justify-content:center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);">
      <div class="modal-content" style="background: var(--card-bg); width: 92%; max-width: 480px; position:relative; border: 1px solid rgba(212, 93, 38, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
          <h2 style="margin:0; font-family: 'Outfit'; color: var(--text-main); display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.5rem;">🧺</span> Your Order
          </h2>
          <button onclick="toggleCartModal()" style="background: rgba(255,255,255,0.05); border: none; font-size: 1.8rem; cursor:pointer; color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s;">&times;</button>
        </div>
        
        <div id="cartItemsList" style="max-height: 45vh; overflow-y: auto; margin-bottom: 25px; padding-right: 5px;">
          <!-- Items injected here -->
        </div>

        <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
          <div class="form-group" style="margin-bottom: 15px;">
            <label style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Your Name (Optional)</label>
            <input type="text" id="customerName" placeholder="e.g. John Doe" style="background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1); color: white;" />
          </div>
          
          <div class="form-group" style="margin-bottom: 15px;">
            <label style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Table Number</label>
            <input type="text" id="tableNumber" placeholder="e.g. Table 04" style="background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1); color: white;" required />
          </div>
          
          <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0 25px 0;">
            <span style="font-weight: 600; color: var(--text-muted); font-size: 1.1rem;">Total Amount</span>
            <span id="cartTotalText" style="font-size: 1.8rem; font-weight: 800; color: var(--primary);">₹0.00</span>
          </div>
          
          <button id="placeOrderBtn" class="primary-btn" style="box-shadow: 0 10px 20px rgba(212, 93, 38, 0.3);">Confirm Order</button>
        </div>
        <p id="orderStatus" class="message-text" style="margin-top: 15px;"></p>
      </div>
    </div>
  </div>

  <script src="frontend/js/index.js"></script>
</body>
</html>
